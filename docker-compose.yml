version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1 # PostgreSQL 15/16 with pgvector pre-installed
    container_name: nexuscore_db
    environment:
      POSTGRES_USER: nexus_user
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: nexuscore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus_user -d nexuscore"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest # Includes Pub/Sub and fast queueing
    container_name: nexuscore_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: