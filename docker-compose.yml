# =============================================================
# NexusCore — Full Stack
#
# Start order (enforced by depends_on + healthchecks):
#   nexuscore-db ──────────────────────────────────┐
#   temporal-db  → temporal (healthy) → redis ─────┤→ nexuscore-api
#                                                   └→ nexuscore-worker
#
# Two separate Postgres instances are intentional:
#   nexuscore-db: pgvector image (Postgres 15) — our app data
#   temporal-db:  postgres:13    (md5 auth)    — Temporal persistence
#   The Temporal Go driver (pq) does not support scram-sha-256 (PG15 default).
#
# Usage:
#   docker compose up --build -d        # full stack
#   docker compose logs -f nexuscore-worker
#   docker compose ps
# =============================================================

services:

  # -----------------------------------------------------------
  # App database — PostgreSQL 15 with pgvector
  # -----------------------------------------------------------
  nexuscore-db:
    image: ankane/pgvector:v0.5.1
    container_name: nexuscore_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexuscore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexuscore"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -----------------------------------------------------------
  # Temporal's own database — Postgres 13 (md5 auth)
  # Temporal's pq driver does not support scram-sha-256 (PG15+).
  # -----------------------------------------------------------
  temporal-db:
    image: postgres:13-alpine
    container_name: nexuscore_temporal_db
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -----------------------------------------------------------
  # Temporal — durable workflow orchestrator
  # -----------------------------------------------------------
  temporal:
    image: temporalio/auto-setup:latest
    container_name: nexuscore_temporal
    depends_on:
      temporal-db:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
      - DBNAME=temporal
      - VISIBILITY_DBNAME=temporal_visibility
    ports:
      - "7233:7233"
    healthcheck:
      # Temporal binds to the container's eth0 IP, not loopback — use hostname -i
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i | awk '{print $1}'):7233 2>/dev/null | grep -q SERVING"]
      interval: 10s
      timeout: 10s
      retries: 25
      start_period: 45s
    restart: unless-stopped

  # -----------------------------------------------------------
  # Redis — async pub/sub for real-time WebSocket streaming
  # -----------------------------------------------------------
  redis:
    image: redis/redis-stack-server:latest
    container_name: nexuscore_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # -----------------------------------------------------------
  # NexusCore API Gateway — FastAPI, returns 202 immediately
  # -----------------------------------------------------------
  nexuscore-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: nexuscore_api
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
      nexuscore-db:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_TASK_QUEUE=nexuscore-task-queue
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@nexuscore-db:5432/nexuscore
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_MAX_RETRIES=${OPENAI_MAX_RETRIES:-3}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # -----------------------------------------------------------
  # NexusCore Worker — Temporal activity runner + MCPPool
  # -----------------------------------------------------------
  nexuscore-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: nexuscore_worker
    command: ["python", "-m", "src.core.worker"]
    depends_on:
      temporal:
        condition: service_healthy
      nexuscore-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ENVIRONMENT=production
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_TASK_QUEUE=nexuscore-task-queue
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_MAX_CONCURRENT_ACTIVITIES:-10}
      - TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS=${TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS:-20}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres@nexuscore-db:5432/nexuscore
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_MAX_RETRIES=${OPENAI_MAX_RETRIES:-3}
      - MCP_POOL_SIZE=${MCP_POOL_SIZE:-4}
      - SUPERVISOR_CONFIDENCE_THRESHOLD=${SUPERVISOR_CONFIDENCE_THRESHOLD:-0.7}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    restart: on-failure

  # -----------------------------------------------------------
  # Temporal Web UI (optional — uncomment to enable)
  # Browse workflows at http://localhost:8080
  # -----------------------------------------------------------
  # temporal-ui:
  #   image: temporalio/ui:latest
  #   container_name: nexuscore_temporal_ui
  #   depends_on:
  #     temporal:
  #       condition: service_healthy
  #   environment:
  #     - TEMPORAL_ADDRESS=temporal:7233
  #   ports:
  #     - "8080:8080"

volumes:
  postgres_data:
  temporal_db_data:
  redis_data:
